name: Keep Render Server Awake

on:
  schedule:
    # Run every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping_render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: curl -s https://electricity-backend-0l2p.onrender.com/api/ping/
