databases:
  - name: electricity-db
    databaseName: billing_system
    user: admin
    plan: free

services:
  - type: web
    name: electricity-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py migrate"
    startCommand: "cd backend && python -c \"import os, django; os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'config.settings'); django.setup(); from api.models import User; User.objects.get_or_create(username='admin_main', defaults={'password_hash': '12345678', 'role': 'admin'})\" && gunicorn config.wsgi:application"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: electricity-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://electricity-frontend.onrender.com"
      - key: ALLOWED_HOSTS
        value: "electricity-backend.onrender.com"

  - type: web
    name: electricity-frontend
    env: static
    buildCommand: "cd admin-dashboard && npm install && npm run build"
    staticPublishPath: "./admin-dashboard/dist"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://electricity-backend.onrender.com/api"
